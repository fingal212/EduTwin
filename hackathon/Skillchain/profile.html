<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой Профиль — SkillChain</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-container { max-width: 800px; margin: 40px auto; animation: fadeInUp 0.6s ease; }
        .profile-header { text-align: center; padding: 40px; background: white; border-radius: 30px; box-shadow: var(--card-shadow); }
        .avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--primary); margin-bottom: 20px; }
        .stats-bar { display: flex; justify-content: space-around; margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; }
        .stat-item b { display: block; font-size: 24px; color: var(--primary); }
        .review-card {
    background: white;
    padding: 25px;
    border-radius: 20px;
    box-shadow: var(--card-shadow);
    margin-bottom: 20px;
    border: 1px solid rgba(0,0,0,0.03);
    transition: transform 0.3s ease;
}

.review-card:hover {
    transform: translateY(-5px); /* Легкий эффект при наведении */
}

.review-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}

.author-name {
    font-weight: 600;
    color: #333;
}

.rating-stars {
    color: #FFB800; /* Золотой цвет для звезд */
    font-size: 14px;
}

.review-text {
    color: #555;
    line-height: 1.6;
    font-style: italic;
}

.review-date {
    display: block;
    margin-top: 15px;
    font-size: 12px;
    color: #aaa;
}
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <a href="index.html" class="logo">SkillChain</a>
            <a href="index.html" style="text-decoration: none; font-weight: 600;">← Назад</a>
        </header>

        <div class="profile-container">
            <div class="profile-header">
                <img src="/b5f692daf4c63c52b5782d5b7c9f12e1.jpg" class="avatar">
                <h2>@пользователь</h2>
                <p style="color: #777;">Английский • Наставник</p>
                
                <div class="stats-bar">
                    <div class="stat-item"><b>4.9</b>Рейтинг</div>
                    <div class="stat-item"><b>12</b>Учеников</div>
                    <div class="stat-item"><b>540</b>SP</div>
                </div>
                <br>
                <a href="balance.html"><button>Пополнить баланс</button></a>
            </div>

            
            <h3 style="margin: 40px 0 20px;">Мои отзывы</h3>

<div class="review-card">
    <div class="review-info">
        <span class="author-name">Анна</span>
        <span class="rating-stars">★★★★★</span>
    </div>
    <p class="review-text">Все понравилось.</p>
    <span class="review-date">2 дня назад</span>
</div>

<div class="review-card">
    <div class="review-info">
        <span class="author-name">Марк</span>
        <span class="rating-stars">★★★★☆</span>
    </div>
    <p class="review-text">Хорошая практика английского. Узнал много новых сленговых выражений.</p>
    <span class="review-date">Неделю назад</span>
</div>
        </div>
    </div>
</body>
</html>
